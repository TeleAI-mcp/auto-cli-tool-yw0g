name: Issue Label Comment Automation

on:
  issues:
    types: [labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'completed' || github.event.label.name == 'feature' || github.event.label.name == 'wontfix'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            let comment;
            if (label === 'completed') {
              comment = 'This issue has been resolved. Thank you for your contribution!';
            } else if (label === 'feature') {
              comment = 'Thank you for the feature request. We will consider including this in a future release.';
            } else if (label === 'wontfix') {
              comment = 'After review, we have decided not to address this issue at this time.';
            }
            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }