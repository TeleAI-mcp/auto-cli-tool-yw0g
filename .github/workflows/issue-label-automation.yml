name: Issue Label Automation

on:
  issues:
    types: [labeled]

jobs:
  label-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on labeled issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            let comment = '';
            
            if (label === 'completed') {
              comment = 'This issue has been resolved. Thank you for your contribution!';
            } else if (label === 'feature') {
              comment = 'Thank you for the feature request. We will consider including this in a future release.';
            } else if (label === 'wontfix') {
              comment = 'After review, we have decided not to address this issue at this time.';
            }
            
            if (comment) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
